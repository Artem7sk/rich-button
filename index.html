<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Club</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            flex-direction: column;
        }
        
        .score-container {
            margin-bottom: 20px;
            text-align: center;
        }

        .score-label { font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .score-value { font-size: 32px; font-weight: bold; color: #ffd700; }

        .rich-button {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #ffeb3b, #fbc02d);
            border-radius: 50%;
            border: 6px solid #f57f17;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            cursor: pointer;
            outline: none;
            transition: transform 0.05s;
            animation: pulse 2s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
        }

        .rich-button:active {
            transform: scale(0.92);
            box-shadow: 0 0 10px #ffd700;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 50px rgba(255, 215, 0, 0.7); }
            100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
        }

        h1 { margin-top: 25px; font-size: 20px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="score-container">
        <div class="score-label">Твой вклад в мечту</div>
        <div id="user-score" class="score-value">0</div>
    </div>

    <button class="rich-button" onclick="sendClick()">💰</button>

    <h1>КЛУБ БОГАЧЕЙ</h1>

    <audio id="coin-sound" src="https://www.soundjay.com/misc/sounds/coin-spill-1.mp3" preload="auto"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Получаем количество нажатий из URL
        const urlParams = new URLSearchParams(window.location.search);
        const startScore = urlParams.get('score') || '0';
        document.getElementById('user-score').innerText = startScore;

        function sendClick() {
            // 1. Вибрация (Haptic Feedback)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('heavy');
            }

            // 2. Звук
            const audio = document.getElementById('coin-sound');
            audio.currentTime = 0;
            audio.play();

            // 3. Отправка данных боту
            tg.sendData("rich_button_clicked");
            
            // Опционально: закрыть через секунду, чтобы успеть услышать звук
            setTimeout(() => { tg.close(); }, 500);
        }
    </script>
</body>
</html>
