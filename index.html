<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Richest Button Club</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            flex-direction: column;
        }

        /* Контейнер для счета */
        .score-container {
            margin-bottom: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 40px;
            border-radius: 50px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .score-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        .score-value { font-size: 38px; font-weight: 900; color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }

        /* ЭЛИТНАЯ ЗОЛОТАЯ КНОПКА */
        .rich-button {
            width: 240px;
            height: 240px;
            position: relative;
            background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            border-radius: 50%;
            border: 8px solid #1a1a1a;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Объемные тени */
            box-shadow: 
                0 0 0 10px rgba(255, 215, 0, 0.05),
                0 20px 50px rgba(0, 0, 0, 0.8),
                inset 0 5px 15px rgba(255, 255, 255, 0.6),
                inset 0 -5px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        /* Блик, бегающий по кнопке */
        .rich-button::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: shine 4s infinite;
        }

        .button-text {
            position: relative;
            z-index: 2;
            color: #4a3500;
            font-weight: 900;
            font-size: 20px;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            pointer-events: none;
        }

        .rich-button:active {
            transform: scale(0.94);
            box-shadow: 0 5px 15px rgba(0,0,0,0.9), inset 0 0 20px rgba(0,0,0,0.5);
        }

        @keyframes shine {
            0% { left: -150%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        .footer-text { margin-top: 30px; font-size: 10px; color: #444; letter-spacing: 4px; text-transform: uppercase; }

    </style>
</head>
<body>

    <div class="score-container">
        <div class="score-label">ЛИЧНЫЙ КАПИТАЛ</div>
        <div id="user-score" class="score-value">0</div>
    </div>

    <button class="rich-button" id="mainBtn">
        <span class="button-text">НАЖМИ<br>И ПОЛУЧИ<br>УДАЧУ</span>
    </button>

    <div class="footer-text">Verified Status: 50 Stars</div>

    <audio id="coin-sound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/cartoon/coins_clanking_small.ogg" type="audio/ogg">
    </audio>

    <script>
        const tg = window.Telegram.WebApp;
        const audio = document.getElementById('coin-sound');
        const btn = document.getElementById('mainBtn');
        
        tg.expand();
        tg.backgroundColor = '#000000';
        tg.headerColor = '#000000';

        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('user-score').innerText = urlParams.get('score') || '0';

        btn.addEventListener('click', () => {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('heavy');
            }

            audio.currentTime = 0;
            audio.play().catch(e => console.log("Sound error:", e));

            btn.style.transform = "scale(0.92)";
            
            setTimeout(() => {
                tg.sendData("rich_button_clicked");
                tg.close();
            }, 400);
        });
    </script>
</body>
</html>
